<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

:root{
  --bg:#080c14;--s1:#0f1520;--s2:#161e2e;--s3:#1c2740;
  --border:#1e2d45;--border2:#2a3d5a;
  --text:#e8edf5;--text2:#8fa3be;--text3:#3d5470;
  --accent:#3b7fff;--accent-d:#2563cc;
  --green:#1db954;--amber:#f0a500;--red:#e5363a;--purple:#9d5cf6;
  --gold:#f5c842;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;--r-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
body.role-boss {--proj:#f5c842;}
body.role-agent{--proj:#3b7fff;}
body.p0{--proj:#3b7fff;}body.p1{--proj:#1db954;}
body.p2{--proj:#e5363a;}body.p3{--proj:#9d5cf6;}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 20px;
  background:radial-gradient(ellipse 90% 60% at 50% -5%,#0d2040 0%,var(--bg) 65%);
}
.login-wrap{width:100%;max-width:400px;}

.login-brand{text-align:center;margin-bottom:36px;}
.login-icon{
  width:72px;height:72px;margin:0 auto 16px;
  background:linear-gradient(145deg,#0f2a50 0%,#1a3a6e 100%);
  border:1px solid #2a4a7e;border-radius:20px;
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  box-shadow:0 12px 40px rgba(59,127,255,.2),0 0 0 1px rgba(59,127,255,.1);
}
.login-brand h1{
  font-size:1.65rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#fff 40%,#8fa3be);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-brand h1 em{
  font-style:normal;
  background:linear-gradient(135deg,#3b7fff,#9d5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-brand p{color:var(--text3);font-size:.83rem;margin-top:6px;letter-spacing:.01em;}

.login-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:18px;padding:32px 28px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
}

/* Google Sign-In button */
.google-btn{
  width:100%;background:#fff;border:none;border-radius:10px;
  padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:12px;height:50px;font-family:var(--sans);font-size:.93rem;font-weight:600;
  color:#1f2937;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.2);
  text-decoration:none;
}
.google-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.3);transform:translateY(-1px);}
.google-btn:active{transform:scale(.98);}
.google-logo{width:22px;height:22px;flex-shrink:0;}

.divider-line{
  display:flex;align-items:center;gap:10px;
  margin:20px 0;color:var(--text3);font-size:.75rem;
}
.divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:var(--border);}

.status-box{
  border-radius:10px;padding:13px 16px;
  font-size:.82rem;line-height:1.6;text-align:center;margin-bottom:16px;
  display:none;
}
.status-box.loading{background:#0c1829;border:1px solid #1a3050;color:#7eb8f7;}
.status-box.error  {background:#1a0808;border:1px solid #5c1a1a;color:#fca5a5;}
.status-box.success{background:#061a0e;border:1px solid #0f3322;color:#4ade80;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text3);margin-bottom:6px;}
.field input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:var(--sans);font-size:.9rem;padding:10px 13px;outline:none;transition:border .15s;
}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text3);}

.btn-login{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);padding:13px;font-family:var(--sans);
  font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .15s;letter-spacing:.01em;margin-bottom:12px;
  display:block;
}
.btn-login:hover{background:var(--accent-d);}
.btn-login:active{transform:scale(.98);}
.btn-setup{
  width:100%;background:transparent;border:1.5px solid var(--border);border-radius:var(--r-sm);
  color:var(--text2);font-family:var(--sans);font-size:.82rem;font-weight:500;
  padding:10px;cursor:pointer;transition:all .15s;margin-top:8px;
}
.btn-setup:hover{border-color:var(--border2);color:var(--text);}

/* Setup URL input (collapsed by default) */
#setup-section{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.btn-primary{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);
  padding:11px;font-family:var(--sans);font-size:.9rem;font-weight:700;
  cursor:pointer;transition:opacity .15s;
}
.btn-primary:hover{opacity:.88;}

/* User info row (shown after OAuth) */
.user-info-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;margin-bottom:16px;display:none;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border2);
}
.user-email{font-size:.8rem;color:var(--text2);}
.user-name-display{font-size:.88rem;font-weight:600;}

.security-note{
  margin-top:16px;text-align:center;font-size:.72rem;
  color:var(--text3);line-height:1.6;
  display:flex;align-items:flex-start;justify-content:center;gap:5px;
}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;}

.topbar{
  background:var(--s1);border-bottom:1px solid var(--border);
  height:54px;padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;gap:10px;
}
.tl{display:flex;align-items:center;gap:9px;}
.tl-logo{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;
}
.tl-name{font-weight:800;font-size:.9rem;letter-spacing:-.01em;}
.role-tag{border-radius:20px;padding:3px 10px;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;}
.role-tag.boss {background:#1a1500;color:var(--gold);border:1px solid #3a3000;}
.role-tag.agent{background:rgba(59,127,255,.12);color:var(--accent);border:1px solid rgba(59,127,255,.25);}

.tr{display:flex;align-items:center;gap:7px;}
.user-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;
  padding:3px 10px 3px 4px;font-size:.72rem;color:var(--text2);
}
.uc-avatar{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:800;color:#fff;flex-shrink:0;
}
.sync-pill{
  display:flex;align-items:center;gap:5px;background:var(--s2);
  border:1px solid var(--border);border-radius:20px;
  padding:4px 10px;font-size:.7rem;color:var(--text2);transition:all .3s;
}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-pill.syncing .sdot{background:var(--amber);animation:blink .6s infinite;}
.sync-pill.error   .sdot{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.icbtn{
  width:32px;height:32px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;flex-shrink:0;
}
.icbtn:hover{border-color:var(--proj,var(--accent));color:var(--proj,var(--accent));}

/* PROJECT TABS */
.ptabs{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:0 14px;display:flex;overflow-x:auto;scrollbar-width:none;
}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{
  padding:10px 16px;font-size:.8rem;font-weight:700;color:var(--text2);
  cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.ptab:hover{color:var(--text);}
.ptab.active{color:var(--proj,var(--accent));border-bottom-color:var(--proj,var(--accent));}
.pcnt{background:var(--s2);border-radius:10px;padding:1px 7px;font-size:.67rem;font-weight:700;color:var(--text3);}
.ptab.active .pcnt{background:var(--proj,var(--accent));color:#fff;}

/* BOSS HEADER */
.boss-hd{
  background:linear-gradient(135deg,#100e00,#1a1600);
  border-bottom:1px solid #2a2200;
  padding:11px 14px;display:flex;align-items:center;gap:12px;
}
.boss-crown{font-size:1.3rem;}
.boss-title{font-weight:800;font-size:.93rem;color:var(--gold);}
.boss-sub{font-size:.73rem;color:#7a6a00;margin-top:1px;}
.boss-bar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:7px;
  overflow-x:auto;scrollbar-width:none;
}
.boss-bar::-webkit-scrollbar{display:none;}
.boss-bar-lbl{font-size:.66rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.afil{
  border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700;
  cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);
  background:var(--s2);color:var(--text2);transition:all .15s;flex-shrink:0;
}
.afil:hover{color:var(--text);border-color:var(--border2);}
.afil.active{background:var(--gold);border-color:var(--gold);color:#111;}

/* MAIN */
.main{flex:1;padding:14px;max-width:760px;margin:0 auto;width:100%;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.stat{
  background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);
  padding:11px 8px;text-align:center;cursor:pointer;transition:border .15s;
}
.stat:hover,.stat.on{border-color:var(--proj,var(--accent));}
.stat-n{font-size:1.25rem;font-weight:800;line-height:1;}
.stat-l{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-top:2px;}

.toolbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.sw{flex:1;min-width:150px;position:relative;}
.sw input{
  width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:var(--sans);font-size:.87rem;
  padding:8px 11px 8px 32px;outline:none;transition:border .15s;
}
.sw input:focus{border-color:var(--proj,var(--accent));}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.8rem;pointer-events:none;}
.add-btn{
  background:var(--proj,var(--accent));border:none;border-radius:var(--r-sm);
  color:#fff;font-family:var(--sans);font-size:.82rem;font-weight:700;
  padding:8px 14px;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:5px;transition:opacity .15s;
}
.add-btn:hover{opacity:.87;}

.sscroll{overflow-x:auto;scrollbar-width:none;margin-bottom:10px;}
.sscroll::-webkit-scrollbar{display:none;}
.srow{display:flex;gap:5px;padding-bottom:2px;min-width:max-content;}
.stab{
  border-radius:6px;padding:4px 11px;font-size:.73rem;font-weight:700;
  cursor:pointer;border:1.5px solid transparent;white-space:nowrap;transition:all .15s;
}

.sort-row{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.sort-lbl{font-size:.71rem;color:var(--text3);font-weight:600;}
.sort-sel{
  background:var(--s1);border:1.5px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:var(--sans);font-size:.77rem;padding:5px 9px;outline:none;cursor:pointer;
}
.sort-sel:focus{border-color:var(--proj,var(--accent));}
.rcnt{margin-left:auto;font-size:.72rem;color:var(--text3);}

/* LEAD CARDS */
#leads{display:flex;flex-direction:column;gap:9px;}
.lcard{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border .15s;}
.lcard:hover{border-color:var(--border2);}
.lcard.open{border-color:var(--proj,var(--accent));}
.lcard.flash{animation:cf .7s ease-out;}
@keyframes cf{0%{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,185,84,.15);}100%{border-color:var(--border);box-shadow:none;}}

.agent-ribbon{
  background:var(--s2);border-bottom:1px solid var(--border);
  padding:4px 14px;font-size:.68rem;font-weight:700;
  display:flex;align-items:center;gap:6px;color:var(--text3);
}
.agent-av{
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0;
}

.lhead{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;}
.linfo{flex:1;min-width:0;}
.lname{font-weight:700;font-size:.93rem;}
.lcontact{font-size:.78rem;color:var(--text2);margin-top:2px;}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}

.sbadge{border-radius:5px;padding:3px 10px;font-size:.71rem;font-weight:800;white-space:nowrap;letter-spacing:.02em;border:1.5px solid transparent;}
.s-NEW            {background:#fff;    color:#333;border-color:#ccc;}
.s-FOLLOW-UP      {background:#FFFF00; color:#333;border-color:#cccc00;}
.s-FOLLOW-UP-APPT {background:#92D050; color:#333;border-color:#6da030;}
.s-APPOINTMENT    {background:#FFC000; color:#333;border-color:#cc9900;}
.s-NO-ANSWER      {background:#D9D9D9; color:#555;border-color:#bbb;}
.s-NOT-INTERESTED {background:#D9D9D9; color:#555;border-color:#bbb;}
.s-PRANK-LEAD     {background:#FF0000; color:#fff;border-color:#cc0000;}
.s-LOAN-PROBLEM   {background:#D9D9D9; color:#555;border-color:#bbb;}
.s-OTHERS-LOCATION{background:#D9D9D9; color:#555;border-color:#bbb;}
.s-WRONG-NUMBER   {background:#D9D9D9; color:#555;border-color:#bbb;}

.ltimeline{border-top:1px solid var(--border);padding:9px 14px 6px;display:flex;flex-direction:column;gap:5px;}
.tl-row{display:flex;align-items:center;gap:7px;font-size:.71rem;}
.tl-icon{font-size:.82rem;width:18px;text-align:center;flex-shrink:0;}
.tl-label{color:var(--text3);font-weight:700;width:76px;flex-shrink:0;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;}
.tl-ago{border-radius:5px;padding:2px 7px;font-weight:700;font-size:.67rem;white-space:nowrap;}
.tl-ago.fresh {background:#061a0e;color:#1db954;border:1px solid #0f3322;}
.tl-ago.recent{background:#1f1608;color:#f0a500;border:1px solid #3d2e08;}
.tl-ago.stale {background:#1a0808;color:#e5363a;border:1px solid #3d1515;}
.tl-ago.none  {background:#131c2a;color:#3d5470;border:1px solid #1e2d45;}
.tl-date{color:var(--text3);font-size:.67rem;}

.lremarks{padding:7px 14px 10px;font-size:.79rem;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);}
.lacts{padding:0 14px 11px;display:flex;gap:6px;flex-wrap:wrap;}
.abtn{
  background:var(--s2);border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:var(--sans);font-size:.76rem;font-weight:600;
  padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;
}
.abtn:hover{border-color:var(--proj,var(--accent));color:var(--proj,var(--accent));}
.abtn.cta{background:var(--proj,var(--accent));border-color:var(--proj,var(--accent));color:#fff;}
.abtn.cta:hover{opacity:.87;}

.upanel{border-top:1px solid var(--border);padding:13px 14px;background:#060c18;}
.upanel label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;}
.upanel select,.upanel textarea{
  width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--sans);font-size:.87rem;padding:8px 11px;outline:none;margin-bottom:11px;
}
.upanel select:focus,.upanel textarea:focus{border-color:var(--proj,var(--accent));}
.upanel select option{background:var(--bg);}
.upanel textarea{resize:vertical;min-height:60px;line-height:1.5;}
.urow{display:flex;gap:7px;}
.urow .abtn{flex:1;justify-content:center;padding:9px;font-size:.84rem;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bg.hide{display:none;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px 20px;width:100%;max-width:420px;}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:16px;}
.modal-row{display:flex;gap:8px;}
.modal-row .abtn{flex:1;justify-content:center;padding:10px;font-size:.88rem;}

.sbox{text-align:center;padding:52px 20px;color:var(--text2);}
.spin{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.sbox-icon{font-size:2rem;margin-bottom:9px;}
.sbox-t{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.sbox-s{font-size:.8rem;color:var(--text3);}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--s1);border:1px solid var(--border);border-radius:30px;padding:9px 18px;font-size:.81rem;opacity:0;pointer-events:none;transition:all .22s;z-index:999;white-space:nowrap;display:flex;align-items:center;gap:6px;max-width:calc(100vw - 28px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok  {border-color:var(--green);color:var(--green);}
#toast.err {border-color:var(--red);  color:var(--red);}
#toast.inf {border-color:var(--accent);color:var(--accent);}
#toast.warn{border-color:var(--amber);color:var(--amber);}

@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .login-card{padding:24px 18px;}
  .tl-name{display:none;}
}
</style>
</head>
<body>

<!-- ═══════════════════════ LOGIN ═══════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">🏠</div>
      <h1>Property <em>CRM</em></h1>
      <p>Sign in with your username and password</p>
    </div>

    <div class="login-card">
        <div class="status-box" id="status-box"></div>

        <div class="field">
          <label>Username</label>
          <input id="login-username" type="text" placeholder="e.g. ahmad"
            autocomplete="username"
            onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="login-password" type="password" placeholder="••••••••"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>

        <button class="btn-login" onclick="doLogin()">Sign In</button>

        <div class="security-note">
          🔒 Ask your boss for your username and password
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ APP ═══════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="tl">
      <div class="tl-logo">🏠</div>
      <div class="tl-name" id="tl-name">CRM</div>
      <span class="role-tag" id="role-tag">Agent</span>
    </div>
    <div class="tr">
      <div class="sync-pill" id="spill"><div class="sdot"></div><span id="slbl">Synced</span></div>
      <div class="user-chip" id="user-chip">
        <div class="uc-avatar" id="uc-avatar">?</div>
        <span id="uc-name"></span>
      </div>
      <button class="icbtn" onclick="manualRefresh()" title="Refresh">🔄</button>
      <button class="icbtn" onclick="signOut()" title="Sign out">🔒</button>
    </div>
  </div>

  <div id="boss-header" style="display:none;">
    <div class="boss-hd">
      <span class="boss-crown">👑</span>
      <div style="flex:1;">
        <div class="boss-title">Boss Dashboard</div>
        <div class="boss-sub" id="boss-sub">All agents · All projects</div>
      </div>
    </div>
    <div class="boss-bar">
      <span class="boss-bar-lbl">Agent</span>
      <div id="agent-pills" style="display:flex;gap:6px;"></div>
    </div>
  </div>

  <div class="ptabs" id="ptabs"></div>

  <div class="main">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <div class="sw"><span class="si">🔍</span>
        <input id="search" placeholder="Search name, contact, remarks…" oninput="render()"/>
      </div>
      <button class="add-btn" id="add-btn" onclick="openAddModal()">➕ Add Lead</button>
    </div>
    <div class="sscroll"><div class="srow" id="srow"></div></div>
    <div class="sort-row">
      <span class="sort-lbl">Sort</span>
      <select class="sort-sel" id="sort-sel" onchange="render()">
        <option value="default">Default</option>
        <option value="name">Name A–Z</option>
        <option value="status">Status</option>
        <option value="stale">Stale first</option>
      </select>
      <span class="rcnt" id="rcnt"></span>
    </div>
    <div id="leads"></div>
  </div>
</div>

<!-- ADD LEAD MODAL -->
<div class="modal-bg hide" id="add-modal">
  <div class="modal">
    <h3>➕ Add New Lead</h3>
    <div class="field"><label>Name</label><input id="m-name" type="text" placeholder="Mr / Ms / Name"/></div>
    <div class="field"><label>Contact</label><input id="m-contact" type="tel" placeholder="011-XXXX XXXX"/></div>
    <div class="field"><label>Status</label><select id="m-status"></select></div>
    <div class="field"><label>Remarks</label>
      <textarea id="m-remarks" placeholder="Initial notes…"
        style="width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
        color:var(--text);font-family:var(--sans);font-size:.87rem;padding:9px 11px;resize:vertical;min-height:56px;outline:none;"></textarea>
    </div>
    <div class="modal-row">
      <button class="abtn cta" onclick="submitAddLead()">Save to Sheet</button>
      <button class="abtn" onclick="document.getElementById('add-modal').classList.add('hide')">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// Projects loaded dynamically from agent's sheet tabs
// No hardcoding needed — agent adds tabs freely
let PROJECTS = [];  // filled by loadProjects()

function makeProjectMeta(name, idx) {
  const emojis  = ['🏢','🏗','🏘','🌿','🏙','🏬','🌆','🏦'];
  const classes = ['p0','p1','p2','p3','p0','p1','p2','p3'];
  // Shorten label: take first word or first 6 chars
  const label = name.replace(/new customer /i,'').split(' ')[0].slice(0,8).toUpperCase();
  return { name, label, emoji: emojis[idx%8], cls: classes[idx%8] };
}

const STATUSES=[
  "NEW","FOLLOW UP","FOLLOW UP APPT","APPOINTMENT",
  "NO ANSWER","NOT INTERESTED","PRANK LEAD",
  "LOAN PROBLEM","OTHERS LOCATION","WRONG NUMBER"
];

const STAB_STYLE={
  "All":["#1e2d45","#8fa3be"],
  "NEW":["#e5e7eb","#333"],"FOLLOW UP":["#FFFF00","#333"],
  "FOLLOW UP APPT":["#92D050","#333"],"APPOINTMENT":["#FFC000","#333"],
  "NO ANSWER":["#D9D9D9","#555"],"NOT INTERESTED":["#D9D9D9","#555"],
  "PRANK LEAD":["#FF0000","#fff"],"LOAN PROBLEM":["#D9D9D9","#555"],
  "OTHERS LOCATION":["#D9D9D9","#555"],"WRONG NUMBER":["#D9D9D9","#555"],
};

// ── STATE ────────────────────────────────────────────────────
let masterUrl       = 'https://script.google.com/macros/s/AKfycbx_M2NWIvjzODQY4StH_v5gasVwc36VvW4oynoxAeJYf3NTArXgqISFnptkumKvIEyj/exec';
let currentUser     = null;   // {name,username,role,scriptUrl,color}
let agentList       = [];
let agentLeads      = {};     // {agentName:{projName:[leads]}}
let prevSnap        = {};
let activeProjIdx   = 0;
let activeStatus    = 'All';
let activeAgentFil  = 'All';
let openId          = null;
let pollTimer       = null;
const POLL_MS       = 30000;

// ═══════════════════════════════════════════════════════════════
//  USERNAME / PASSWORD LOGIN
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  if (!masterUrl) {
    showStatus('Cannot reach CRM server. Master URL not configured.', 'error');
    return;
  }
  if (!username || !password) {
    showStatus('Please enter both username and password.', 'error');
    return;
  }

  showStatus('Signing in…', 'loading');
  try {
    // Use GET to avoid CORS issues with Google Apps Script
    const url = masterUrl
      + '?action=login'
      + '&username=' + encodeURIComponent(username.toLowerCase())
      + '&password=' + encodeURIComponent(password)
      + '&t=' + Date.now();

    const res  = await fetch(url);
    const data = await res.json();

    if (!data.authenticated) {
      showStatus(data.error || 'Login failed.', 'error');
      return;
    }

    currentUser = {
      name:      data.name || username,
      username,
      role:      data.role || 'agent',
      scriptUrl: data.scriptUrl || '',
      color:     data.color || '#3b7fff',
    };

    localStorage.setItem('crm_session', JSON.stringify({
      ...currentUser, masterUrl, ts: Date.now()
    }));

    showStatus('Welcome, ' + currentUser.name + '! Loading your leads…', 'success');
    setTimeout(startApp, 500);

  } catch(e) {
    showStatus('Cannot reach CRM server. Check your Master Script URL.', 'error');
    console.error('Login error:', e);
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status-box');
  el.textContent = msg;
  el.className   = 'status-box ' + type;
  el.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════
//  SETUP URL
// ═══════════════════════════════════════════════════════════════


function signOut() {
  clearInterval(pollTimer);
  currentUser = null; agentLeads = {}; prevSnap = {};
  openId = null; activeProjIdx = 0; activeStatus = 'All'; activeAgentFil = 'All';
  localStorage.removeItem('crm_session');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('app').style.display          = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('status-box').style.display    = 'none';
  document.getElementById('boss-header').style.display   = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  DYNAMIC PROJECT LOADING
// ═══════════════════════════════════════════════════════════════
async function loadProjects(agent) {
  const url = agent.scriptUrl + '?action=getProjects&t=' + Date.now();
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.projects && data.projects.length) {
      PROJECTS = data.projects.map((p, i) => makeProjectMeta(p.name, i));
      buildProjTabs();
      buildStatusFilters();
    }
  } catch(e) { console.error('loadProjects:', e); }
}

// ═══════════════════════════════════════════════════════════════
//  APP START
// ═══════════════════════════════════════════════════════════════
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display          = 'flex';

  const isBoss = currentUser.role === 'boss';
  document.body.className = isBoss ? 'role-boss' : 'role-agent p0';
  document.getElementById('tl-name').textContent       = currentUser.name;
  document.getElementById('role-tag').textContent      = isBoss ? '👑 Boss' : '👤 Agent';
  document.getElementById('role-tag').className        = 'role-tag ' + (isBoss ? 'boss' : 'agent');
  document.getElementById('uc-name').textContent       = currentUser.name.split(' ')[0];
  document.getElementById('uc-avatar').textContent     = currentUser.name[0].toUpperCase();
  document.getElementById('uc-avatar').style.background= currentUser.color;
  document.getElementById('add-btn').style.display     = isBoss ? 'none' : 'flex';

  buildProjTabs();
  buildStatusFilters();
  buildModalStatuses();

  if (isBoss) {
    document.getElementById('boss-header').style.display = 'block';
    // Boss sees all agents — load projects from first agent with a scriptUrl
    const firstAgent = agentList.find(a => a.scriptUrl);
    if (firstAgent) await loadProjects(firstAgent);
    fetchAllAgents();
  } else {
    // Agent — load their own projects first, then leads
    await loadProjects(currentUser);
    fetchAgentLeads(currentUser, false);
  }
  startPolling();
}

// ═══════════════════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════════════════
function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (currentUser.role === 'boss') fetchAllAgents();
    else fetchAgentLeads(currentUser, false);
  }, POLL_MS);
}
function manualRefresh() {
  if (currentUser.role === 'boss') fetchAllAgents();
  else {
    loadProjects(currentUser).then(() => fetchAgentLeads(currentUser, false));
  }
}

async function fetchAllAgents() {
  setSyncUI('syncing','Syncing all agents…');
  // Fetch agent list from master
  try{
    const res  = await fetch(masterUrl+'?action=getAllAgents&username='+encodeURIComponent(currentUser.username)+'&t='+Date.now());
    const data = await res.json();
    if(data.agents) agentList = data.agents.filter(a=>a.role!=='boss');
  }catch(e){ console.error('fetchAllAgents:',e); }

  for(const agent of agentList){
    if(agent.scriptUrl) await fetchAgentLeads(agent, true);
  }
  buildBossAgentFilter();
  fullRender();
  setSyncUI('ok','Synced '+nowTime());
}

async function fetchAgentLeads(agent, silent) {
  if (!agent.scriptUrl) return;
  if (!silent) setSyncUI('syncing','Syncing…');
  const proj = PROJECTS[activeProjIdx];
  try{
    const res  = await fetch(agent.scriptUrl+'?action=getLeads&sheet='+encodeURIComponent(proj.name)+'&t='+Date.now());
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    const incoming = data.leads||[];
    incoming.forEach(l=>{ l.agentName=agent.name; l.agentColor=agent.color||'#3b7fff'; });
    const changed = detectChanges(agent.name, proj.name, incoming);
    if(!agentLeads[agent.name]) agentLeads[agent.name]={};
    agentLeads[agent.name][proj.name]=incoming;
    buildSnap();
    if(!silent){ fullRender(changed); setSyncUI('ok','Synced '+nowTime()); if(changed.length) toast(changed.length+' updated','inf'); }
  }catch(e){
    if(!silent){ setSyncUI('error','Sync failed'); console.error(e); }
  }
}

// ═══════════════════════════════════════════════════════════════
//  BUILD UI COMPONENTS
// ═══════════════════════════════════════════════════════════════
function buildProjTabs(){
  document.getElementById('ptabs').innerHTML=PROJECTS.map((p,i)=>
    `<div class="ptab${i===0?' active':''}" id="pt${i}" onclick="switchProj(${i})">
      ${p.emoji} ${p.label}<span class="pcnt" id="pc${i}">0</span>
    </div>`
  ).join('');
}
function switchProj(idx){
  activeProjIdx=idx; activeStatus='All'; openId=null;
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('active',t.dataset.s==='All'));
  document.body.className=(currentUser.role==='boss'?'role-boss':'role-agent ')+PROJECTS[idx].cls;
  document.getElementById('search').value='';
  if(currentUser.role==='boss') fetchAllAgents(); else fetchAgentLeads(currentUser,false);
}

function buildStatusFilters(){
  document.getElementById('srow').innerHTML=['All',...STATUSES].map(s=>{
    const [bg,fg]=STAB_STYLE[s]||['#1e2d45','#8fa3be'];
    return `<div class="stab${s==='All'?' active':''}" data-s="${s}"
      style="background:${bg};color:${fg};border-color:${bg==='#1e2d45'?'#2a3d5a':bg}"
      onclick="setStatus(this,'${s}')">${s}</div>`;
  }).join('');
}
function buildModalStatuses(){
  document.getElementById('m-status').innerHTML=STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
}
function setStatus(el,s){
  activeStatus=s; openId=null;
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('active',t.dataset.s===s));
  render();
}

function buildBossAgentFilter(){
  const pills = document.getElementById('agent-pills');
  pills.innerHTML=
    `<div class="afil${activeAgentFil==='All'?' active':''}" onclick="setAgentFil('All')">All</div>`+
    agentList.map(a=>
      `<div class="afil${activeAgentFil===a.name?' active':''}"
        style="${activeAgentFil===a.name?'background:'+a.color+';border-color:'+a.color+';color:#fff':''}"
        onclick="setAgentFil('${esc(a.name)}')">${esc(a.name)}</div>`
    ).join('');
}
function setAgentFil(name){ activeAgentFil=name; buildBossAgentFilter(); fullRender(); }

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function detectChanges(aName,pName,incoming){
  return incoming.filter(l=>{
    const prev=prevSnap[aName+':'+pName+':'+l.id];
    return prev&&(prev.status!==l.status||prev.remarks!==l.remarks);
  }).map(l=>l.id);
}
function buildSnap(){
  prevSnap={};
  Object.keys(agentLeads).forEach(a=>Object.keys(agentLeads[a]).forEach(p=>{
    (agentLeads[a][p]||[]).forEach(l=>{ prevSnap[a+':'+p+':'+l.id]={status:l.status,remarks:l.remarks}; });
  }));
}

function getVisible(){
  const proj=PROJECTS[activeProjIdx];
  const isBoss=currentUser.role==='boss';
  let leads=[];
  if(isBoss){
    const agents=activeAgentFil==='All'?agentList:agentList.filter(a=>a.name===activeAgentFil);
    agents.forEach(a=>{ leads=leads.concat((agentLeads[a.name]||{})[proj.name]||[]); });
  } else {
    leads=(agentLeads[currentUser.name]||{})[proj.name]||[];
  }
  return leads;
}

function fullRender(flashIds=[]){ renderStats(); render(flashIds); }

function renderStats(){
  const leads=getVisible();
  const c=s=>leads.filter(l=>l.status===s).length;
  const cg=g=>g.reduce((a,s)=>a+c(s),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat" onclick="setStatusTo('All')">
      <div class="stat-n" style="color:#60a5fa">${leads.length}</div><div class="stat-l">Total</div></div>
    <div class="stat" onclick="setStatusTo('FOLLOW UP')">
      <div class="stat-n" style="color:#FFFF00">${cg(['FOLLOW UP','FOLLOW UP APPT'])}</div><div class="stat-l">Follow Up</div></div>
    <div class="stat" onclick="setStatusTo('APPOINTMENT')">
      <div class="stat-n" style="color:#FFC000">${c('APPOINTMENT')}</div><div class="stat-l">Appt</div></div>
    <div class="stat" onclick="setStatusTo('NO ANSWER')">
      <div class="stat-n" style="color:#8fa3be">${c('NO ANSWER')}</div><div class="stat-l">No Answer</div></div>`;

  PROJECTS.forEach((p,i)=>{
    const el=document.getElementById('pc'+i);
    if(!el) return;
    let cnt=0;
    if(currentUser.role==='boss') agentList.forEach(a=>{ cnt+=(agentLeads[a.name]||{})[p.name]?.length||0; });
    else cnt=(agentLeads[currentUser.name]||{})[p.name]?.length||0;
    el.textContent=cnt;
  });
  if(currentUser.role==='boss'){
    const total=agentList.reduce((a,ag)=>{const p=PROJECTS[activeProjIdx];return a+((agentLeads[ag.name]||{})[p.name]?.length||0);},0);
    document.getElementById('boss-sub').textContent=agentList.length+' agents · '+PROJECTS[activeProjIdx].label+' · '+total+' total leads';
  }
}

function setStatusTo(s){
  activeStatus=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('active',t.dataset.s===s));
  render();
}

function render(flashIds=[]){
  const isBoss=currentUser.role==='boss';
  let leads=getVisible();
  const q=document.getElementById('search').value.toLowerCase();
  const sortBy=document.getElementById('sort-sel').value;

  if(activeStatus!=='All') leads=leads.filter(l=>l.status===activeStatus);
  if(q) leads=leads.filter(l=>[l.name,l.contact,l.remarks,l.status,l.agentName||''].some(v=>(v||'').toLowerCase().includes(q)));
  if(sortBy==='name') leads.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  if(sortBy==='status') leads.sort((a,b)=>STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status));
  if(sortBy==='stale') leads.sort((a,b)=>staleness(b)-staleness(a));

  document.getElementById('rcnt').textContent=leads.length+' lead'+(leads.length!==1?'s':'');
  const el=document.getElementById('leads');
  if(!leads.length){
    el.innerHTML=`<div class="sbox"><div class="sbox-icon">📋</div>
      <div class="sbox-t">No leads found</div>
      <div class="sbox-s">${q?'Try different search term':'No leads with this status'}</div></div>`;
    return;
  }

  el.innerHTML=leads.map(lead=>{
    const isOpen=openId===lead.id, isFlash=flashIds.includes(lead.id);
    const aColor=lead.agentColor||'#3b7fff';
    return `<div class="lcard${isOpen?' open':''}${isFlash?' flash':''}" id="c-${esc(lead.id)}">
      ${isBoss?`<div class="agent-ribbon">
        <div class="agent-av" style="background:${aColor}">${(lead.agentName||'?')[0].toUpperCase()}</div>
        ${esc(lead.agentName||'—')}</div>`:''}
      <div class="lhead" onclick="toggle('${esc(lead.id)}')">
        <div class="linfo">
          <div class="lname">${esc(lead.name||'(No name)')}</div>
          <div class="lcontact">📞 ${esc(lead.contact||'—')}</div>
        </div>
        <div class="lright">
          <span class="sbadge s-${esc(lead.status.replace(/ /g,'-'))}">${esc(lead.status)}</span>
        </div>
      </div>
      ${lead.remarks?`<div class="lremarks">${esc(lead.remarks)}</div>`:''}
      ${activityBlock(lead)}
      ${isOpen?`
      <div class="lacts">
        <button class="abtn" onclick="callLead('${esc(lead.id)}',${lead.rowIndex},'${esc(lead.contact)}','${esc(lead.agentName||currentUser.name)}')">📞 Call</button>
        <button class="abtn" onclick="waLead('${esc(lead.id)}',${lead.rowIndex},'${esc(lead.contact)}','${esc(lead.name)}','${esc(lead.agentName||currentUser.name)}')">💬 WhatsApp</button>
        ${!isBoss?`<button class="abtn cta" onclick="void(0)">✏️ Update</button>`:''}
      </div>
      ${!isBoss?`<div class="upanel">
        <label>Update Status</label>
        <select id="sel-${esc(lead.id)}">
          ${STATUSES.map(s=>`<option value="${s}"${s===lead.status?' selected':''}>${s}</option>`).join('')}
        </select>
        <label>Add Remark (appended with date)</label>
        <textarea id="txt-${esc(lead.id)}" placeholder="e.g. called, will visit Saturday…"></textarea>
        <div class="urow">
          <button class="abtn cta" onclick="doSave('${esc(lead.id)}',${lead.rowIndex})">💾 Save to Sheet</button>
          <button class="abtn" onclick="toggle('${esc(lead.id)}')">Cancel</button>
        </div>
      </div>`:''}`:''}</div>`;
  }).join('');
}

function toggle(id){ openId=(openId===id)?null:id; render();
  if(openId) setTimeout(()=>document.getElementById('c-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50); }
function doSave(id,rowIndex){
  const status=document.getElementById('sel-'+id)?.value;
  const remark=document.getElementById('txt-'+id)?.value||'';
  if(status) saveLead(id,rowIndex,status,remark);
}

// ═══════════════════════════════════════════════════════════════
//  WRITE BACK
// ═══════════════════════════════════════════════════════════════
async function saveLead(id,rowIndex,status,newRemark){
  const proj=PROJECTS[activeProjIdx];
  const lead=((agentLeads[currentUser.name]||{})[proj.name]||[]).find(l=>l.id===id);
  const prev=lead?lead.status:'';
  const nowDT=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const nowStr=pad(nowDT.getDate())+'/'+pad(nowDT.getMonth()+1)+'/'+nowDT.getFullYear()+' '+pad(nowDT.getHours())+':'+pad(nowDT.getMinutes());
  if(lead){
    if(prev!==status){ lead.status=status; lead.tsStatus=nowStr+' ['+currentUser.name+'] '+prev+'→'+status; }
    if(newRemark&&newRemark.trim()){
      const entry=nowDT.getDate()+'/'+(nowDT.getMonth()+1)+' ['+currentUser.name+'] '+newRemark.trim();
      lead.remarks=lead.remarks?lead.remarks+' | '+entry:entry;
      lead.tsRemark=nowStr;
    }
  }
  openId=null; fullRender();
  if(!currentUser.scriptUrl){ toast('Updated (no script configured)','warn'); return; }
  setSyncUI('syncing','Saving…');
  try{
    const res=await fetch(currentUser.scriptUrl,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'updateLead',rowIndex,sheet:proj.name,status,newRemark,agent:currentUser.name})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    buildSnap(); setSyncUI('ok','Saved '+nowTime());
    toast((lead?.name||'Lead')+' → '+status,'ok');
    const card=document.getElementById('c-'+id);
    if(card){ card.classList.add('flash'); setTimeout(()=>card.classList.remove('flash'),800); }
  }catch(e){ if(lead) lead.status=prev; setSyncUI('error','Save failed'); toast('Save failed: '+e.message,'err'); fullRender(); }
}

// ═══════════════════════════════════════════════════════════════
//  CALL / WHATSAPP
// ═══════════════════════════════════════════════════════════════
function callLead(id,rowIndex,contact,agentName){
  if(!contact||contact==='—') return;
  window.open('tel:'+contact.replace(/\s/g,''));
  logAction(id,rowIndex,agentName,'logCall','tsCall');
}
function waLead(id,rowIndex,contact,name,agentName){
  if(!contact||contact==='—') return;
  const clean=contact.replace(/[\s\-]/g,'');
  const num=clean.startsWith('0')?'6'+clean:clean;
  const msg=encodeURIComponent('Hi '+(name||'')+", I'm "+currentUser.name+' from the property team. Following up on your enquiry. Are you still interested? 😊');
  window.open('https://wa.me/'+num+'?text='+msg);
  logAction(id,rowIndex,agentName,'logWhatsApp','tsWa');
}
async function logAction(leadId,rowIndex,agentName,action,tsField){
  const proj=PROJECTS[activeProjIdx];
  const aName=agentName||currentUser.name;
  const lead=((agentLeads[aName]||{})[proj.name]||[]).find(l=>l.id===leadId);
  const nowDT=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const nowStr=pad(nowDT.getDate())+'/'+pad(nowDT.getMonth()+1)+'/'+nowDT.getFullYear()+' '+pad(nowDT.getHours())+':'+pad(nowDT.getMinutes());
  if(lead) lead[tsField]=nowStr;
  render();
  const url=currentUser.role==='boss'?(agentList.find(a=>a.name===aName)||{}).scriptUrl:currentUser.scriptUrl;
  if(!url) return;
  try{
    await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action,rowIndex,sheet:proj.name,agent:currentUser.name})});
    buildSnap();
  }catch(e){ console.error('logAction:',e); }
}

function openAddModal(){
  ['m-name','m-contact','m-remarks'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-status').value='NEW';
  document.getElementById('add-modal').classList.remove('hide');
}
document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.add('hide'); });
async function submitAddLead(){
  const proj=PROJECTS[activeProjIdx];
  const name=document.getElementById('m-name').value.trim();
  const contact=document.getElementById('m-contact').value.trim();
  const status=document.getElementById('m-status').value;
  const remarks=document.getElementById('m-remarks').value.trim();
  if(!contact){ toast('Please enter a contact number','err'); return; }
  document.getElementById('add-modal').classList.add('hide');
  if(!currentUser.scriptUrl){
    const newId='R'+Date.now();
    if(!agentLeads[currentUser.name]) agentLeads[currentUser.name]={};
    if(!agentLeads[currentUser.name][proj.name]) agentLeads[currentUser.name][proj.name]=[];
    agentLeads[currentUser.name][proj.name].push({rowIndex:999,id:newId,name,contact,status,remarks,agentName:currentUser.name});
    buildSnap(); fullRender(); return;
  }
  setSyncUI('syncing','Adding…');
  try{
    const res=await fetch(currentUser.scriptUrl,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'addLead',sheet:proj.name,name,contact,status,remarks})});
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    toast((name||contact)+' added ✅','ok');
    await fetchAgentLeads(currentUser,false);
  }catch(e){ setSyncUI('error','Add failed'); toast('Add failed: '+e.message,'err'); }
}

// ═══════════════════════════════════════════════════════════════
//  ACTIVITY TIMELINE
// ═══════════════════════════════════════════════════════════════
function activityBlock(lead){
  const rows=[
    {icon:'🔖',label:'Status',   val:lead.tsStatus},
    {icon:'📝',label:'Remark',   val:lead.tsRemark},
    {icon:'📞',label:'Last Call',val:lead.tsCall},
    {icon:'💬',label:'WhatsApp', val:lead.tsWa},
  ];
  if(!rows.some(r=>r.val&&r.val!=='—')) return '';
  return '<div class="ltimeline">'+rows.map(r=>{
    const {label:ago,cls}=timeAgo(r.val);
    const ds=r.val&&r.val!=='—'?fmtShort(r.val):'';
    return '<div class="tl-row"><span class="tl-icon">'+r.icon+'</span><span class="tl-label">'+r.label+'</span>'+
      '<span class="tl-ago '+cls+'">'+ago+'</span>'+(ds?'<span class="tl-date">'+ds+'</span>':'')+
    '</div>';
  }).join('')+'</div>';
}

// ═══════════════════════════════════════════════════════════════
//  TIME HELPERS
// ═══════════════════════════════════════════════════════════════
function timeAgo(str){
  if(!str||str==='—') return {label:'—',cls:'none'};
  const m=String(str).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(!m) return {label:'—',cls:'none'};
  const d=new Date(+m[3],+m[2]-1,+m[1],+(m[4]||0),+(m[5]||0));
  const diff=Math.floor((Date.now()-d)/60000);
  if(diff<1)   return {label:'Just now',cls:'fresh'};
  if(diff<60)  return {label:diff+'m ago',cls:'fresh'};
  if(diff<1440)return {label:Math.floor(diff/60)+'h ago',cls:'fresh'};
  const days=Math.floor(diff/1440);
  if(days===1) return {label:'Yesterday',cls:'recent'};
  if(days<=3)  return {label:days+' days ago',cls:'recent'};
  return {label:days+' days ago',cls:'stale'};
}
function fmtShort(str){
  if(!str||str==='—') return '';
  const m=String(str).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(!m) return str.slice(0,16);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return +m[1]+' '+months[+m[2]-1]+', '+(m[4]||'00')+':'+(m[5]||'00');
}
function staleness(lead){
  const ts=lead.tsStatus||lead.tsRemark||lead.tsCall||lead.tsWa||'';
  if(!ts||ts==='—') return 999999;
  const m=String(ts).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(!m) return 999998;
  const d=new Date(+m[3],+m[2]-1,+m[1],+(m[4]||0),+(m[5]||0));
  return Math.floor((Date.now()-d)/60000);
}

// ═══════════════════════════════════════════════════════════════
function setSyncUI(s,l){ document.getElementById('spill').className='sync-pill '+s; document.getElementById('slbl').textContent=l; }
let _tt;
function toast(msg,type='ok'){
  const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>{ el.className='toast'; },3200);
}
function nowTime(){ return new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
